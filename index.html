<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>โปรแกรมจับเวลา</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100vh; background-color: #f4f7f6; margin: 0;
    transition: background-color 0.3s;
  }
  .alarm-active { animation: blinkRed 1s infinite; }
  @keyframes blinkRed { 
      0% { background-color: #ffcccc; } 
      50% { background-color: #f4f7f6; } 
      100% { background-color: #ffcccc; } 
  }
  
  .container {
    background: white; padding: 40px; border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center;
    position: relative; z-index: 10;
  }
  h2 { margin-top: 0; color: #333; }
  .inputs { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
  .input-group { display: flex; flex-direction: column; }
  label { font-size: 1.1rem; color: #666; margin-bottom: 5px; }
  input {
    width: 70px; padding: 10px; font-size: 1.5rem; text-align: center;
    border: 2px solid #ddd; border-radius: 10px; outline: none;
  }
  input:focus { border-color: #007bff; }
  
  /* ปรับแต่งหน้าจอเวลาให้มีมิลลิวินาที */
  .time-display { 
    font-size: 5rem; font-weight: bold; margin: 20px 0; color: #222; 
    font-variant-numeric: tabular-nums; /* ป้องกันตัวเลขดิ้นเวลากะพริบเร็วๆ */
  }
  .ms-text {
    font-size: 2.5rem; /* ทำให้ตัวมิลลิวินาทีเล็กลงหน่อยเพื่อความสวยงาม */
    color: #666;
  }

  button {
    padding: 12px 25px; font-size: 1.2rem; cursor: pointer; border: none;
    border-radius: 10px; margin: 5px; color: white; transition: 0.2s; font-weight: bold;
  }
  #startBtn { background-color: #28a745; }
  #startBtn:hover { background-color: #218838; }
  #resetBtn { background-color: #6c757d; }
  #resetBtn:hover { background-color: #5a6268; }
  
  #stopAlarmBtn { 
    background-color: #dc3545; display: none; font-size: 1.5rem; padding: 15px 30px; 
    box-shadow: 0 5px 15px rgba(220, 53, 69, 0.4); animation: pulse 1s infinite;
  }
  @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
</style>
</head>
<body>

<div class="container">
  <h2>⏳ โปรแกรมจับเวลา</h2>
  
  <div class="inputs">
    <div class="input-group">
      <label>นาที</label>
      <input type="number" id="minutes" min="0" value="0">
    </div>
    <div class="input-group">
      <label>วินาที</label>
      <input type="number" id="seconds" min="0" max="59" value="10">
    </div>
  </div>

  <div class="time-display" id="display">00:10<span class="ms-text">.00</span></div>

  <div>
    <button id="startBtn" onclick="startTimer()">เริ่มจับเวลา</button>
    <button id="resetBtn" onclick="resetTimer()">รีเซ็ต</button>
    <button id="stopAlarmBtn" onclick="stopAlarm()">🛑 ปิดเสียงเตือน!</button>
  </div>
</div>

<script>
  let countdown;
  let alarmInterval;
  let isRunning = false;
  let audioCtx;
  let endTime; // ตัวแปรเก็บเวลาที่หมด

  const display = document.getElementById('display');
  const minInput = document.getElementById('minutes');
  const secInput = document.getElementById('seconds');
  
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');
  const stopAlarmBtn = document.getElementById('stopAlarmBtn');

  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playBeep() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine'; 
    osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
    gain.gain.setValueAtTime(1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.4);
  }

  // อัปเดตหน้าจอให้แสดง นาที:วินาที.มิลลิวินาที
  function updateDisplay(m, s, ms = 0) {
    let minStr = String(m).padStart(2, '0');
    let secStr = String(s).padStart(2, '0');
    let msStr = String(ms).padStart(2, '0');
    // แทรก span เพื่อให้ตัวเลขมิลลิวินาทีเล็กลงนิดหน่อย
    display.innerHTML = `${minStr}:${secStr}<span class="ms-text">.${msStr}</span>`;
  }

  function startTimer() {
    if (isRunning) return;

    let totalMilliseconds = (parseInt(minInput.value || 0) * 60 + parseInt(secInput.value || 0)) * 1000;

    if (totalMilliseconds <= 0) {
        alert("กรุณาตั้งเวลาให้มากกว่า 0 วินาที");
        return;
    }

    initAudio(); 
    isRunning = true;
    
    // ตั้งเป้าหมายเวลาในอนาคตเทียบกับเวลาจริงปัจจุบัน
    endTime = Date.now() + totalMilliseconds;

    // รันอัปเดตหน้าจอทุกๆ 10 มิลลิวินาที เพื่อความสมูท
    countdown = setInterval(() => {
      let remaining = endTime - Date.now();

      if (remaining <= 0) {
        clearInterval(countdown);
        isRunning = false;
        updateDisplay(0, 0, 0); // บังคับให้เป็น 00:00.00 พอดี
        triggerAlarm(); 
      } else {
        let m = Math.floor(remaining / 60000);
        let s = Math.floor((remaining % 60000) / 1000);
        let ms = Math.floor((remaining % 1000) / 10); // หาร 10 เพื่อให้แสดง 2 หลัก (00-99)
        updateDisplay(m, s, ms);
      }
    }, 10);
  }

  function triggerAlarm() {
    startBtn.style.display = "none";
    resetBtn.style.display = "none";
    stopAlarmBtn.style.display = "inline-block";
    
    document.body.classList.add("alarm-active"); 

    playBeep(); 
    alarmInterval = setInterval(playBeep, 600); 
  }

  function stopAlarm() {
    clearInterval(alarmInterval); 
    document.body.classList.remove("alarm-active"); 
    
    stopAlarmBtn.style.display = "none";
    startBtn.style.display = "inline-block";
    resetBtn.style.display = "inline-block";
    
    resetTimer(); 
  }

  function resetTimer() {
    clearInterval(countdown);
    isRunning = false;
    updateDisplay(minInput.value || 0, secInput.value || 0, 0);
  }

  minInput.addEventListener('input', () => { if(!isRunning) updateDisplay(minInput.value || 0, secInput.value || 0, 0) });
  secInput.addEventListener('input', () => { if(!isRunning) updateDisplay(minInput.value || 0, secInput.value || 0, 0) });
</script>

</body>
</html>
